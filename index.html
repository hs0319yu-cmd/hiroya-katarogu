
<!DOCTYPE html>
<html>
<head>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ヒロヤ 2026 カタログ</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ヒロヤカタログ">
<meta name="theme-color" content="#111111">

</head>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

.title{
font-size:22px;
padding:10px;
}

#viewer{
width:100%;
height:88vh;
display:flex;
align-items:center;
justify-content:center;
}

#viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.arrow{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:40px;
background:rgba(0,0,0,.5);
border:none;
color:white;
padding:10px;
cursor:pointer;
}

#prev{left:5px}
#next{right:5px}

#nav{
margin:10px;
}

input{
font-size:18px;
padding:5px;
width:90px;
}

button{
font-size:18px;
padding:5px 10px;
margin:3px;
}

#thumbs{
display:none;
flex-wrap:wrap;
justify-content:center;
background:#222;
padding:10px;
}

.thumb{
width:70px;
margin:3px;
cursor:pointer;
font-size:12px;
}

.thumb img{
width:100%;
}

</style>

</head>

<body>

<div class="title">ヒロヤ 2026 カタログ</div>

<button id="prev" class="arrow">←</button>
<button id="next" class="arrow">→</button>

<div id="viewer">
<img id="pageImg">
</div>

<div id="nav">
ページ <input id="jump">
<button onclick="jump()">移動</button>
<button onclick="toggleThumb()">ページ一覧</button>
</div>

<div id="thumbs"></div>

<script>

let pages = 130
let offset = 3
let page = 1

let img = document.getElementById("pageImg")

function show(){

let num = String(page).padStart(5,'0')
img.src = "./pages/new_catalog-page-" + num + ".jpg"

}

show()

/* 矢印 */

document.getElementById("prev").onclick=()=>{
if(page>1){
page--
show()
}
}

document.getElementById("next").onclick=()=>{
if(page<pages){
page++
show()
}
}

/* スワイプ */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
if(page<pages){
page++
show()
}
}

if(endX-startX>50){
if(page>1){
page--
show()
}
}

})

/* ジャンプ */

function jump(){

let p=parseInt(document.getElementById("jump").value)

if(isNaN(p)) return

let real = p - offset

if(real < 1) real = 1
if(real > pages) real = pages

page = real

show()

}

/* サムネ */

let thumbs=""

for(let i=1;i<=pages;i++){

let num = String(i).padStart(5,'0')
let catalog = i + offset

thumbs += `
<div class="thumb" onclick="go(${i})">
${catalog}
<img loading="lazy" src="./pages/new_catalog-page-${num}.jpg">
</div>
`

}

document.getElementById("thumbs").innerHTML = thumbs

function go(p){
page=p
show()
}

/* サムネ表示 */

function toggleThumb(){

let t=document.getElementById("thumbs")

if(t.style.display=="flex"){
t.style.display="none"
}else{
t.style.display="flex"
}

}

</script>
<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
